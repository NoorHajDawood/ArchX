[terminal]
# The VT to run the greeter on. Can be "next", "current" or a number
# designating the VT.
vt = 1

# The default session, also known as the greeter.
[default_session]

# Graphical greeter user (must exist; created by greetd package packaging / setup)
user = "greeter"

# DankMaterialShell greeter → starts Hyprland after login
command = "/usr/bin/dms-greeter --command hyprland"
